services:
  postgres:
    image: postgres:16-alpine
    container_name: diploma_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diploma_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: "false"
      # First-launch superadmin provisioning
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      SUPERADMIN_FIRSTNAME: ${SUPERADMIN_FIRSTNAME:-ЦНО}
      SUPERADMIN_LASTNAME: ${SUPERADMIN_LASTNAME:-Admin}
      # Seed control
      SEED_ON_FIRST_RUN: ${SEED_ON_FIRST_RUN:-true}
      SEED_FORCE: ${SEED_FORCE:-false}
      # CORS origins — comma-separated, set to server URL in production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      # Email / SMTP (leave empty to disable notifications)
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL:-admin@cno.dnu.edu.ua}
    ports:
      - "1337:1337"
    volumes:
      - ./backend/public/uploads:/app/public/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = same-origin mode: nginx proxies /api → backend:1337 (recommended).
        # Set to http://SERVER_IP:1337 only if backend is on a separate host.
        VITE_STRAPI_URL: ${VITE_STRAPI_URL:-}
    container_name: diploma_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # On the server: keep default 80 (HTTP). Locally: set FRONTEND_PORT=3000 in .env
      - "${FRONTEND_PORT:-80}:80"

  backup:
    image: postgres:16-alpine
    container_name: diploma_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ./backups:/backups
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
      # Read-only access to uploaded files so each backup can snapshot them too.
      - ./backend/public/uploads:/uploads-src:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]

volumes:
  pgdata:
